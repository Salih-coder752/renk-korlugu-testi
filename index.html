<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Vision Test / Renk Körlüğü Testi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F3EE;
  --surface: #FFFFFF;
  --surface2: #F0EDE6;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1A1916;
  --text2: #6B6860;
  --text3: #9B9890;
  --accent: #2D6A4F;
  --accent-light: #D8F3DC;
  --warn: #B5540A;
  --warn-light: #FEF3C7;
  --danger: #9B1C1C;
  --danger-light: #FDE8E8;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 24px 16px 60px;
}

.container {
  width: 100%;
  max-width: 480px;
}

/* ── LANGUAGE SCREEN ── */
#lang-screen {
  animation: fadeUp 0.5s ease;
}

.lang-hero {
  text-align: center;
  padding: 48px 0 36px;
}

.eye-icon {
  width: 64px;
  height: 64px;
  background: var(--text);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
}

.lang-hero h1 {
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.5px;
  margin-bottom: 8px;
}

.lang-hero p {
  font-size: 14px;
  color: var(--text2);
}

.lang-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 24px;
}

.lang-btn {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.18s;
  font-family: 'DM Sans', sans-serif;
  text-align: left;
  box-shadow: var(--shadow);
}

.lang-btn:hover {
  border-color: var(--text);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.lang-btn.selected {
  border-color: var(--text);
  background: var(--text);
  color: var(--bg);
}

.flag {
  font-size: 24px;
  line-height: 1;
  flex-shrink: 0;
}

.lang-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  display: block;
}

.lang-btn.selected .lang-name { color: var(--bg); }

.lang-native {
  font-size: 11px;
  color: var(--text3);
  display: block;
}

.lang-btn.selected .lang-native { color: rgba(255,255,255,0.6); }

.start-btn {
  width: 100%;
  padding: 16px;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.start-btn:hover { opacity: 0.88; transform: translateY(-1px); }
.start-btn:active { transform: scale(0.99); }

/* ── APP SCREEN ── */
#app-screen { display: none; animation: fadeUp 0.4s ease; }

.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-top: 8px;
}

.app-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
}

.progress-wrap {
  display: flex;
  gap: 5px;
  margin-bottom: 20px;
}

.prog-dot {
  flex: 1;
  height: 3px;
  border-radius: 2px;
  background: var(--border2);
  transition: background 0.3s;
}
.prog-dot.done { background: var(--accent); }
.prog-dot.current { background: var(--text); }

.plate-card {
  background: var(--surface);
  border-radius: 20px;
  padding: 20px;
  box-shadow: var(--shadow-md);
  margin-bottom: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.plate-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  margin-bottom: 14px;
}

.plate-num {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text3);
}

.plate-type {
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--surface2);
  color: var(--text2);
}

canvas {
  border-radius: 50%;
  display: block;
  box-shadow: 0 4px 20px rgba(0,0,0,0.10);
}

.question {
  font-size: 15px;
  font-weight: 500;
  text-align: center;
  margin: 16px 0 14px;
  color: var(--text);
}

.options {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  width: 100%;
  margin-bottom: 12px;
}

.opt-btn {
  padding: 14px 10px;
  border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: var(--shadow);
}

.opt-btn:hover:not(:disabled) {
  border-color: var(--text);
  transform: translateY(-1px);
}

.opt-btn.correct {
  background: var(--accent-light);
  border-color: var(--accent);
  color: var(--accent);
}

.opt-btn.wrong {
  background: var(--danger-light);
  border-color: var(--danger);
  color: var(--danger);
}

.opt-btn:disabled { cursor: default; }

.feedback {
  min-height: 20px;
  font-size: 13px;
  color: var(--text2);
  text-align: center;
  margin-bottom: 10px;
}

.next-btn {
  width: 100%;
  padding: 14px;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: none;
  transition: opacity 0.15s;
}
.next-btn:hover { opacity: 0.85; }

/* ── RESULT SCREEN ── */
#result-screen {
  display: none;
  animation: fadeUp 0.5s ease;
}

.result-hero {
  background: var(--surface);
  border-radius: 20px;
  padding: 36px 24px;
  box-shadow: var(--shadow-md);
  text-align: center;
  margin-bottom: 16px;
}

.result-eye {
  font-size: 48px;
  margin-bottom: 12px;
}

.result-score {
  font-size: 64px;
  font-weight: 600;
  font-family: 'DM Mono', monospace;
  letter-spacing: -2px;
  line-height: 1;
  margin-bottom: 6px;
}

.result-sub {
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 24px;
}

.verdict-badge {
  display: inline-block;
  padding: 10px 20px;
  border-radius: 40px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 8px;
}

.verdict-ok { background: var(--accent-light); color: var(--accent); }
.verdict-mild { background: var(--warn-light); color: var(--warn); }
.verdict-severe { background: var(--danger-light); color: var(--danger); }

.result-note {
  font-size: 12px;
  color: var(--text3);
  margin-top: 8px;
}

.breakdown {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}

.breakdown h3 {
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 14px;
}

.breakdown-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.breakdown-row:last-child { border-bottom: none; }

.br-label { color: var(--text2); }
.br-val { font-weight: 600; font-family: 'DM Mono', monospace; }
.br-correct { color: var(--accent); }
.br-wrong { color: var(--danger); }

.action-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.btn-outline {
  padding: 14px;
  border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: var(--shadow);
}

.btn-outline:hover { border-color: var(--text); }

.btn-primary {
  padding: 14px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--text);
  color: var(--bg);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.85; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pop {
  0% { transform: scale(1); }
  40% { transform: scale(1.04); }
  100% { transform: scale(1); }
}

.pop { animation: pop 0.25s ease; }

.lang-flag-sel {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  cursor: pointer;
  background: var(--surface);
  transition: all 0.15s;
}
.lang-flag-sel:hover { border-color: var(--text); }

.timer-bar-wrap {
  width: 100%;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-bottom: 16px;
  overflow: hidden;
}
.timer-bar {
  height: 100%;
  background: var(--text);
  border-radius: 2px;
  transition: width 1s linear, background 0.3s;
}
</style>
</head>

<!-- LANGUAGE SCREEN -->
<div id="lang-screen">

    <h1 id="hero-title">Color Vision Test</h1>

  </div>

  <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar"></div></div>

  <div class="plate-card">

      <span class="plate-type" id="plate-type">Red-Green</span>
    </div>
    <canvas id="plate" width="300" height="300"></canvas>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn"></button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen">
  <div class="result-hero">
    <div class="result-eye" id="result-emoji">👁</div>
    <div class="result-score" id="res-score"></div>
    <div class="result-sub" id="res-sub"></div>
    <div class="verdict-badge" id="res-verdict"></div>
    <div class="result-note" id="res-note"></div>
  </div>

  <div class="breakdown" id="breakdown"></div>

  <div class="action-row">
    <button class="btn-outline" onclick="changeLang()" id="btn-lang-change"></button>
    <button class="btn-primary" onclick="restart()" id="btn-restart"></button>
  </div>
</div>

</div>

// ── SEEDED RNG ──
function rng(seed) {
  let s = seed;
  return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
}

// ── HSV → RGB ──
function hsvToRgb(h, s, v) {
  h = ((h % 360) + 360) % 360;
  const c = v * s, x = c * (1 - Math.abs((h/60)%2 - 1)), m = v - c;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}
  else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}
  const to255 = n => Math.min(255, Math.max(0, Math.round((n+m)*255)));
  return `rgb(${to255(r)},${to255(g)},${to255(b)})`;
}

// ── REAL ISHIHARA PLATE GENERATOR ──
// Based on ruoso/ishihara-generator algorithm (MIT):
// 1. Place N points with log-radial distribution (denser at center)
// 2. Size each circle by nearest-neighbor distance
// 3. Color each circle by HSV: same S+V range, only H differs (fg vs bg)
// 4. V varies ±vVar randomly — this is what makes it hard for colorblind people
function drawPlate(canvas, test, idx) {
  const ctx = canvas.getContext("2d");
  const W = 300, R = 148;
  canvas.width = W; canvas.height = W;
  ctx.clearRect(0, 0, W, W);
  const rand = rng(idx * 9371 + 137);

  const COUNT = 1800;
  const MIN_R = 3.5, MAX_R = 14;

  // ── 1. Generate point positions (log-radial, like Perl original) ──
  const pts = [];
  for (let i = 0; i < COUNT; i++) {
    const angle = rand() * Math.PI * 2;
    // log distribution: log(rand*9+1)/log(10) — denser near center
    const distNorm = Math.log(rand() * 9 + 1) / Math.log(10);
    const dist = distNorm * (R - MAX_R - 2);
    pts.push({ x: W/2 + dist * Math.cos(angle), y: W/2 + dist * Math.sin(angle), r: 0 });
  }

  // ── 2. Mask function: is this point inside the number? ──
  // Build pixel mask on offscreen canvas
  const mask = buildMask(test, W);

  // ── 3. Size each circle by half the distance to nearest neighbor ──
  // Use spatial grid to speed up neighbor search
  const gridCells = 20;
  const cellSz = W / gridCells;
  const grid = {};
  function gridKey(gx, gy) { return gx + ',' + gy; }
  function addToGrid(p) {
    const gx = Math.floor(p.x / cellSz), gy = Math.floor(p.y / cellSz);
    for (let dx = -1; dx <= 1; dx++) for (let dy = -1; dy <= 1; dy++) {
      const k = gridKey(gx+dx, gy+dy);
      if (!grid[k]) grid[k] = [];
      grid[k].push(p);
    }
  }
  function nearestDist(p) {
    const gx = Math.floor(p.x / cellSz), gy = Math.floor(p.y / cellSz);
    const k = gridKey(gx, gy);
    const neighbors = grid[k] || [];
    let best = R;
    for (const q of neighbors) {
      if (q === p) continue;
      const d = Math.sqrt((q.x-p.x)**2 + (q.y-p.y)**2);
      if (d < best) best = d;
    }
    return best;
  }

  // First pass: add all to grid
  for (const p of pts) addToGrid(p);

  // Second pass: compute radius = half nearest-neighbor dist, clamped
  for (const p of pts) {
    const d = nearestDist(p);
    p.r = Math.min(MAX_R, Math.max(MIN_R, d * 0.48));
  }

  // ── 4. Draw circles with HSV coloring ──
  // clip setup
  ctx.save();
  ctx.beginPath();
  ctx.arc(W/2, W/2, R, 0, Math.PI*2);
  ctx.clip();

  // Draw each point
  for (const p of pts) {
    // Is this point inside the number mask?
    const mx = Math.round(p.x), my = Math.round(p.y);
    const inNumber = mask[my * W + mx] === 1;
    const isFg = test.hidden ? false : inNumber;

    // HSV: same S and V range, hue differs
    const hue = isFg ? test.hFg : test.hBg;
    // Value varies randomly (this is the Ishihara trick)
    const v = Math.min(1, Math.max(0.25, test.vBase + (rand() * 2 - 1) * test.vVar));
    // Slight saturation variation
    const s = Math.min(1, Math.max(0.2, test.s + (rand() * 0.16 - 0.08)));
    // Tiny hue jitter for naturalness
    const h = hue + (rand() * 10 - 5);

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = hsvToRgb(h, s, v);
    ctx.fill();
  }

  // Vignette
  const grad = ctx.createRadialGradient(W/2,W/2,R*0.55, W/2,W/2,R);
  grad.addColorStop(0, "rgba(0,0,0,0)");
  grad.addColorStop(1, "rgba(0,0,0,0.13)");
  ctx.beginPath();
  ctx.arc(W/2,W/2,R,0,Math.PI*2);
  ctx.fillStyle = grad; ctx.fill();

  ctx.restore();
}

// Build a binary mask: 1 = inside number, 0 = background
function buildMask(test, W) {
  const mask = new Uint8Array(W * W);
  if (test.hidden || test.answer === 0) return mask;

  const ansStr = String(test.answer);
  // Render digits onto an offscreen canvas, then sample
  const oc = document.createElement('canvas');
  oc.width = W; oc.height = W;
  const octx = oc.getContext('2d');

  // Use chunky font for cleaner mask
  const fontSize = ansStr.length === 1 ? 140 : 100;
  octx.fillStyle = '#000';
  octx.font = `900 ${fontSize}px Georgia, serif`;
  octx.textAlign = 'center';
  octx.textBaseline = 'middle';
  // Draw slightly offset copies to fatten the mask (more dots in number)
  for (let ox = -6; ox <= 6; ox += 3) for (let oy = -6; oy <= 6; oy += 3)
    octx.fillText(ansStr, W/2 + ox, W/2 + oy);

  const imgData = octx.getImageData(0, 0, W, W).data;
  for (let i = 0; i < W * W; i++) {
    mask[i] = imgData[i * 4 + 3] > 30 ? 1 : 0; // alpha channel
  }
  return mask;
}

  choices.sort(() => Math.random() - 0.5);
  if (!choices.includes(test.answer)) choices[0] = test.answer;
  choices.sort(() => Math.random() - 0.5);

  for (const c of choices) {
    const btn = document.createElement("button");
    btn.className = "opt-btn";
    btn.textContent = c === 0 ? t("no_number") : c;
    btn.onclick = () => checkAnswer(c, test, btn);
    opt.appendChild(btn);
  }
}

function startTimer() {
  clearTimer();
  timeLeft = 12;
  const bar = document.getElementById("timer-bar");
  bar.style.width = "100%";
  bar.style.background = "";
  timerInterval = setInterval(() => {
    timeLeft--;
    const pct = (timeLeft / 12) * 100;
    bar.style.width = pct + "%";
    if (timeLeft <= 4) bar.style.background = "#B5540A";
    if (timeLeft <= 0) {
      clearTimer();
      bar.style.width = "0%";
      autoFail();
    }
  }, 1000);
}

function clearTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function autoFail() {
  if (answered) return;
  answered = true;
  document.getElementById("feedback").textContent = t("time_up") + " " + t("answer_was") + " " + (TESTS[current].answer === 0 ? t("no_number") : TESTS[current].answer);
  document.querySelectorAll(".opt-btn").forEach(b => {
    const bVal = b.textContent === t("no_number") ? 0 : parseInt(b.textContent);
    if (bVal === TESTS[current].answer) b.classList.add("correct");
    b.disabled = true;
  });
  history.push({ plate: current+1, correct: false, answer: TESTS[current].answer, given: -1 });
  const nb = document.getElementById("next-btn");
  nb.style.display = "block";
  nb.textContent = current < TESTS.length-1 ? t("next") : t("finish");
}

function checkAnswer(val, test, btn) {
  if (answered) return;
  clearTimer();
  answered = true;
  const correct = val === test.answer;
  if (correct) { score++; btn.classList.add("correct"); btn.classList.add("pop"); }
  else { btn.classList.add("wrong"); }

  document.querySelectorAll(".opt-btn").forEach(b => {
    const bVal = b.textContent === t("no_number") ? 0 : parseInt(b.textContent);
    if (bVal === test.answer) b.classList.add("correct");
    b.disabled = true;
  });

  const fb = document.getElementById("feedback");
  if (correct) {
    fb.textContent = t("correct");
    fb.style.color = "var(--accent)";
  } else {
    const ans = test.answer === 0 ? t("no_number") : test.answer;
    fb.textContent = t("wrong") + " " + t("answer_was") + " " + ans;
    fb.style.color = "var(--danger)";
  }

  history.push({ plate: current+1, correct, answer: test.answer, given: val, type: test.type });

  const nb = document.getElementById("next-btn");
  nb.style.display = "block";
  nb.textContent = current < TESTS.length-1 ? t("next") : t("finish");
}

function showQuestion() {
  answered = false;
  document.getElementById("feedback").textContent = "";
  document.getElementById("feedback").style.color = "";
  document.getElementById("next-btn").style.display = "none";
  document.getElementById("timer-bar").style.width = "100%";
  document.getElementById("timer-bar").style.background = "";

  const test = TESTS[current];
  buildProgress();
  buildOptions(test);

  document.getElementById("plate-num").textContent =
    String(current+1).padStart(2,"0") + " " + t("of") + " " + TESTS.length;

  const typeLabels = { rg: t("plate_rg"), by: t("plate_by"), hidden: t("plate_hidden") };
  document.getElementById("plate-type").textContent = typeLabels[test.type] || "";

  document.getElementById("question").textContent =
    test.hidden ? t("question_hidden") : t("question");

  const canvas = document.getElementById("plate");
  drawPlate(canvas, test, current);

  startTimer();
}

function showResult() {
  clearTimer();
  document.getElementById("app-screen").style.display = "none";
  document.getElementById("result-screen").style.display = "block";

  const total = TESTS.length;
  const pct = score / total;

  document.getElementById("res-score").textContent = score + t("of") + total;
  document.getElementById("res-sub").textContent = score + " " + t("correct_answers");

  const verdict = document.getElementById("res-verdict");
  const note = document.getElementById("res-note");
  const emoji = document.getElementById("result-emoji");

  if (pct >= 0.8) {
    verdict.textContent = t("verdict_ok");
    verdict.className = "verdict-badge verdict-ok";
    note.textContent = t("note_ok");
    emoji.textContent = "✅";
  } else if (pct >= 0.6) {
    verdict.textContent = t("verdict_mild");
    verdict.className = "verdict-badge verdict-mild";
    note.textContent = t("note_mild");
    emoji.textContent = "⚠️";
  } else {
    verdict.textContent = t("verdict_severe");
    verdict.className = "verdict-badge verdict-severe";
    note.textContent = t("note_severe");
    emoji.textContent = "🔴";
  }

  // breakdown table
  const bd = document.getElementById("breakdown");
  let html = `<h3>${t("breakdown_title")}</h3>`;
  history.forEach(h => {
    const ans = h.answer === 0 ? t("no_number") : h.answer;
    html += `<div class="breakdown-row">
      <span class="br-label">${t("plate_rg")} #${h.plate}</span>
      <span class="br-val ${h.correct ? "br-correct":"br-wrong"}">${h.correct ? "✓ "+ans : "✗ "+ans}</span>
    </div>`;
  });
  bd.innerHTML = html;

  document.getElementById("btn-lang-change").textContent = t("btn_lang");
  document.getElementById("btn-restart").textContent = t("btn_restart");
}

function restart() {
  current = 0; score = 0; answered = false; history.length = 0;
  document.getElementById("result-screen").style.display = "none";
  document.getElementById("app-screen").style.display = "block";
  showQuestion();
}

document.getElementById("next-btn").onclick = () => {
  current++;
  if (current >= TESTS.length) showResult();
  else showQuestion();
};

// ── INIT ──
buildLangGrid();
updateLangScreen();
</script>
</body>
</html>
